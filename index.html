<!DOCTYPE html>
<html lang="en">

<head>
    <title>Wedding RSVP</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        h1 {
            text-align: center;
            color: rgb(193, 170, 102);
            margin-top: 100px;
            font-family: 'Brush Script MT';
        }

        body {
    margin: 20px; /*empty space */

    background-image: /* for layers */
        linear-gradient( /* first layer the gradient */
            to bottom,
            rgba(245, 245, 220, 0.2) 0%,
            rgba(222, 205, 170, 0.8) 70%,
            rgba(205, 190, 150, 1) 100%
        ),
         /*bottom layer: url("beigeflowers.jpg");*/

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

        p {
            text-align: center;
            color: rgb(193, 170, 102);
            font-family: 'Brush Script MT';
        }

        /*link doesn't have underline */

        a {
            color: inherit;
            text-decoration: none;
        }

        /* hover effect */
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>Welcome to Bradley and Maggie's Wedding Page</h1>

    <p>
        Join us as we celebrate our love!<br>
        Ceremony at 
        <a href="https://maps.google.com/?q=Moscow+Russia" target="_blank">
            Moscow, Russia
        </a>
    </p>

</body>
</html>
